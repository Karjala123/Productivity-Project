name: productanalytics
description: AI-Powered Productivity Analytics and Digital Usage Optimization Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.0
  firebase_analytics: ^11.1.0

  # State Management
  provider: ^6.1.1

  # Charts & Graphs
  fl_chart: ^0.65.0

  # HTTP & API
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Animations
  animate_do: ^3.3.4
  lottie: ^3.0.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_svg: ^2.0.9

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Auth
  local_auth: ^2.1.7
  google_sign_in: ^6.2.1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0

  # Fonts & Icons
  google_fonts: ^6.1.0
  flutter_iconly: ^1.0.2

  cupertino_icons: ^1.0.2
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  app_usage: ^4.1.0
  flutter_background_service: ^5.1.0
  flutter_overlay_window: ^0.5.0
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
